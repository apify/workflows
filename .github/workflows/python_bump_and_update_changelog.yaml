name: Bump version and update changelog

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.14" # The newest Python version.
      version_number:
        description: Version number of the new release (no leading "v")
        required: true
        type: string
      changelog:
        description: The complete changelog
        required: true
        type: string
    secrets:
      APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN:
        required: true
    outputs:
      changelog_commitish:
        description: Git HEAD after the commit and push
        value: ${{ jobs.bump_and_update_changelog.outputs.changelog_commitish }}

jobs:
  bump_and_update_changelog:
    runs-on: ubuntu-latest
    outputs:
      changelog_commitish: ${{ steps.commit.outputs.commit-sha || github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up uv package manager
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Update package version in pyproject.toml
        shell: bash
        run: |
          new_version="${{ inputs.version_number }}"
          echo "Updating version in pyproject.toml to ${new_version}"
          uv version "${new_version}"

      - name: Update CHANGELOG.md
        uses: DamianReeves/write-file-action@v1.3
        with:
          path: CHANGELOG.md
          write-mode: overwrite
          contents: ${{ inputs.changelog }}

      - name: Stage changes
        id: stage
        run: |
          git pull --rebase --autostash
          git add -A
          if git diff --cached --quiet; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        id: commit
        if: steps.stage.outputs.has-changes == 'true'
        uses: apify/workflows/commit@main
        with:
          commit-message: "chore(release): Update changelog and package version [skip ci]"
          github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
