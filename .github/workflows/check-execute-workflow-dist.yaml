name: Check and Update dist in js actions

on:
  push:
    branches:
      - main
    paths:
      - 'execute-workflow/**'
      - '.github/workflows/check-execute-workflow-dist.yaml'

permissions:
  contents: write

jobs:
  check-and-update-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        uses: ./pnpm-install

      - name: Rebuild dist
        run: pnpm --filter execute-workflow build

      - name: Commit and push if changed
        uses: apify/actions/signed-commit@v1.0.0
        with:
          message: "chore: rebuild execute-workflow dist [skip ci]"
          add: 'execute-workflow/dist/'
          github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
