name: Check and Update dist in js actions

on:
  push:
    branches:
      - main
    paths:
      - 'execute-workflow/**'
      - '.github/workflows/check-execute-workflow-dist.yaml'

permissions:
  contents: write

jobs:
  check-and-update-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        uses: ./pnpm-install

      - name: Rebuild dist
        run: pnpm --filter execute-workflow build

      - name: Stage dist changes
        id: stage
        run: |
          git add 'execute-workflow/dist/'
          if git diff --cached --quiet; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.stage.outputs.has-changes == 'true'
        uses: ./commit
        with:
          commit-message: "chore: rebuild execute-workflow dist [skip ci]"
          github-token: ${{ secrets.APIFY_SERVICE_ACCOUNT_GITHUB_TOKEN }}
