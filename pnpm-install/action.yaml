name: "pnpm install"
description: "Run pnpm install with cache enabled"

inputs:
  working-directory:
    description: "Directory containing pnpm-lock.yaml (defaults to repo root)"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    # Skip on ARM64: pierotofy/set-swap-space@v1.0 unconditionally calls
    # `swapoff $(swapon --show=NAME | tail -n 1)`, which on ARM64 GitHub
    # runners (no pre-allocated swap) resolves to `swapoff <empty>` and
    # exits non-zero with "swapoff: bad usage". x86_64 runners ship with
    # an existing swap file, so the action works there.
    - name: Set up swap space
      if: runner.os == 'Linux' && runner.arch != 'ARM64'
      uses: pierotofy/set-swap-space@v1.0
      with:
        swap-size-gb: 10

    - uses: pnpm/action-setup@v4.1.0
      name: Install pnpm
      with:
        run_install: false
        package_json_file: ${{ inputs.working-directory }}/package.json

    - name: Expose pnpm config(s) through "$GITHUB_OUTPUT"
      id: pnpm-config
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    - name: Cache rotation keys
      id: cache-rotation
      shell: bash
      run: |
        echo "YEAR_MONTH=$(/bin/date -u "+%Y%m")" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-config.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pnpm install --frozen-lockfile --prefer-offline --loglevel error
      env:
        HUSKY: "0"
